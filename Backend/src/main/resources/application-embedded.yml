# Purpose: Run API without MySQL — H2 in-memory + embedded schema (pricing, auth basics).
spring:
  datasource:
    url: jdbc:h2:mem:filemagic;DB_CLOSE_DELAY=-1;MODE=MySQL;DATABASE_TO_LOWER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  sql:
    init:
      mode: always
      schema-locations: classpath:db/embedded-schema.sql
  h2:
    console:
      enabled: false
